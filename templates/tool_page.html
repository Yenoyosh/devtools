<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title }}</title>
  <style>
    body{margin:0;font-family:Calibri,Arial,sans-serif;background:radial-gradient(circle at top,#16213a 0,#0b1120 55%);color:#e5eefc}
    .wrap{max-width:920px;margin:0 auto;padding:28px 18px}.panel{background:rgba(17,24,39,.94);border:1px solid #263247;border-radius:22px;padding:22px;margin-top:18px}
    a{color:#93c5fd}.muted{color:#9fb0d1} h1{margin:0 0 10px}
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="/">← zurück zur Startseite</a></p>
    <div class="panel">
      <h1>{{ title }}</h1>
      <p class="muted">{{ text }}</p>
    </div>
  </div>
</body>
</html>
